name: Compute Derived Metrics (ROE/ROCE/book-value/ratios)

# Recomputes per-stock derived metrics from each fundamentals-v2 bundle's own
# statements and writes them to the bundle snapshot + stock_master quality
# columns (roe_pct, roce_pct, debt_equity, pb_ratio, ev_ebitda, piotroski_score,
# rev/profit 5y CAGR, promoter/fii/dii %, latest periods). Fill-don't-overwrite +
# sanity-gated. Keeps the app's ratios/scorecard populated as bundles update.

on:
  schedule:
    # Daily 13:00 UTC (6:30 PM IST) — after the day's fundamental/quarterly crons.
    - cron: '0 13 * * *'
    # Catch-up slot: GitHub silently drops schedules; the job is fill-don't-overwrite
    # and idempotent, so a second run is harmless. This re-anchor also clears any
    # intraday valuation drift, so it must not silently miss a day.
    - cron: '45 14 * * *'
  workflow_dispatch:

concurrency:
  group: compute-metrics
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compute + populate derived metrics (TTM ROE/ROCE from last 4 quarters)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python compute_metrics.py --ttm

      # H11: append today's dated row per stock to stock_metrics_history (point-in-time
      # store — the foundation for as-of/backtest features without survivorship bias).
      - name: Append point-in-time metrics snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python snapshot_history.py

      # Keep sector (heatmap) + dividend yield (screener) populated daily.
      - name: Backfill sector from index constituents
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python backfill_sector.py
      - name: Backfill dividend yield from corporate actions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python backfill_div_yield.py
