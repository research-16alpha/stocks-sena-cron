name: Corporate Actions Scraper

on:
  schedule:
    # Twice daily: 09:00 UTC (2:30 PM IST) + 13:30 UTC (7 PM IST)
    # NSE updates corp actions during market hours + after close.
    - cron: '0 9,13 * * 1-5'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape NSE corporate actions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python corp_actions_scraper.py
