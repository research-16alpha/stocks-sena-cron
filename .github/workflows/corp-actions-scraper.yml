name: Corporate Actions Scraper

on:
  # SCHEDULE DISABLED 2026-06-13: NSE soft-blocks this endpoint for datacenter IPs - the
  # cloud runner gets STALE cached rows (no forward ex-dates) while reporting success, so
  # it quietly stopped updating. Now runs from the laptop via daily_feeds.bat (residential
  # IP, where NSE serves the real forward window). Kept for manual dispatch only.
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape NSE corporate actions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python corp_actions_scraper.py
