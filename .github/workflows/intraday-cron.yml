name: Intraday OHLCV Refresh

on:
  # Every 10 min between 9:15-15:30 IST (3:45-10:00 UTC), Mon-Fri
  schedule:
    - cron: '*/10 4-9 * * 1-5'   # 04:00 - 09:50 UTC = 09:30 - 15:20 IST
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intraday refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SKIP_MARKET_CHECK: '0'
        run: python intraday_cron.py
