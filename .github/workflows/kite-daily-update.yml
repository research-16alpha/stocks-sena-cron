name: Kite Daily Update (prices + candles, token from DB)

# The EVERYDAY price/candle refresh — moved off the laptop into the cloud.
# Reads the daily Kite access token from the app_config table (the user refreshes
# it each morning; no redeploy, no laptop). Kite is the single price source.
# Fails loud (picked up by monitor.yml) if the token is missing/expired.

on:
  schedule:
    # 10:20 UTC = 3:50 PM IST, just after the NSE close. The morning token is
    # still valid at this hour (Kite tokens last until ~next pre-open).
    - cron: '20 10 * * 1-5'
    # 13:40 UTC = 7:10 PM IST catch-up — GitHub drops schedules and transient
    # Supabase timeouts killed the 2026-06-10 run; the script is idempotent so a
    # second pass is harmless and self-heals the day (concurrency dedupes overlap).
    - cron: '40 13 * * 1-5'
  workflow_dispatch:
    inputs:
      args:
        description: 'extra args, e.g. --prices-only or --no-intraday'
        required: false
        default: '--no-intraday'

concurrency:
  group: kite-daily-update
  cancel-in-progress: false   # let a running update finish; queue the next

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        # kiteconnect is installed only here (not in the shared requirements.txt)
        # so the other 36 crons' dependency resolution is untouched.
        run: pip install -r requirements.txt kiteconnect==4.2.0
      - name: Kite daily update (token from app_config)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        # default now INCLUDES the intraday pass (was --no-intraday, which meant the
        # intraday/{sym}.json bucket NEVER refreshed from the cloud and the app's 1D
        # charts went permanently stale - caught 2026-06-10). timeout raised 90->150.
        run: python kite_daily_update.py --workers 4 ${{ github.event.inputs.args || '' }}
