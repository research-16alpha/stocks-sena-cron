name: Macro Scraper

# NOTE 2026-06-11: website /macro page removed (use /global). This feed now serves
# ONLY the app MacroDashboardScreen — retire after that screen migrates to global view.
on:
  schedule:
    - cron: '30 1 * * *'  # Daily 1:30 AM UTC = 7 AM IST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run macro scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python macro_scraper.py
