name: NSE Delta Quarterly (results-comparision) [DISABLED — frozen feed]

# H4: DISABLED. The results-comparision endpoint this drives is FROZEN at
# Jan-2025 (RELIANCE re_create_dt=16-JAN-2025) yet a scheduled run re-inserted
# 839 STALE quarters across 228 symbols while reporting "success". Current
# quarters now flow via bse-results-delta (structured BSE XBRL) +
# integrated-filing-quarterly (NSE banks). Schedule removed; manual-dispatch only.
# Do NOT re-enable without a verified live feed.

on:
  workflow_dispatch:

jobs:
  delta:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: NSE quarterly delta (banks + non-banks via results-comparision endpoint)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python nse_delta_quarterly.py
