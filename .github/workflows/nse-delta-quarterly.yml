name: NSE Delta Quarterly (results-comparision)

on:
  schedule:
    # 3x per week — Tue/Thu/Sat at 8:00 UTC (1:30 PM IST)
    # Catches new quarterly result filings + bank-schema updates
    - cron: '0 8 * * 2,4,6'
  workflow_dispatch:

jobs:
  delta:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: NSE quarterly delta (banks + non-banks via results-comparision endpoint)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python nse_delta_quarterly.py
