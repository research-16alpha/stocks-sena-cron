name: NIFTY PCR Refresh

on:
  # Every 10 min between 9:15-15:30 IST (3:45-10:00 UTC), Mon-Fri.
  # Matches the intraday-cron schedule so PCR + intraday move together.
  schedule:
    - cron: '*/10 4-9 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt kiteconnect==4.2.0

      - name: Fetch NIFTY PCR via Kite (token from app_config)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python pcr_cron_kite.py
