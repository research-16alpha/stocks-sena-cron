name: Stock Research Reports (PDF) — manual only

# SUPERSEDED by on-demand rendering at Vercel /api/report (TypeScript engine,
# reportHtml.ts). Reports now generate lazily on first view each day and cache
# to Supabase Storage `reports/`. This Python/Playwright batch is kept for manual
# bulk runs only (workflow_dispatch) — its nightly schedule is disabled so it
# cannot overwrite the on-demand renders.

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: 'comma-separated symbols (blank = full non-bank universe)'
        required: false
        default: ''

jobs:
  reports:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Playwright + Chromium
        run: pip install playwright requests && python -m playwright install --with-deps chromium
      - name: Generate research PDFs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LOGO_PATH: logo.png
        run: python gen_reports.py ${{ github.event.inputs.symbols }}
