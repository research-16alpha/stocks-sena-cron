name: Stock Master Scraper (deprecated - manual only)

# DEPRECATED: this scraper uses yfinance which is rate-limited and times out
# the 25-min GitHub Actions slot for 4,500 stocks (only ~200-300 complete).
# Replaced by daily-snapshot-refresh.yml which uses Yahoo v8 chart API and
# pushes price/mcap/PE/PB back to stock_master via sync_snapshot_to_stock_master.py.
# Kept here for manual one-off backfills (e.g. when a new field is added).
on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock master scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python stock_master_scraper.py
