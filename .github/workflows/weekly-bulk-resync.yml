name: Weekly Bulk Re-sync (safety net)

on:
  schedule:
    # Sunday 4:00 UTC = 9:30 AM IST — catches any filings the daily delta missed
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  resync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # H4: replaced the broken chain (fetch PDFs → apply 0 → nse_delta --force
      # which clobbered with Jan-2025-frozen stale rows) with the structured
      # delta over a WIDE 15-day window — re-pulls anything the daily run missed,
      # from primary XBRL, fill-don't-clobber (no --force, no stale overwrite).
      - name: Refresh scrip-code map
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python build_identifier_master.py --populate

      - name: Structured re-sync of results filed in the last 15 days
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python bse_results_delta_cron.py --flagdur 3 --workers 8

      - name: Recompute derived metrics (TTM)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python compute_metrics.py --ttm
